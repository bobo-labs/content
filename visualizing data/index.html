<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>bobo_OS — On-Chain Data Flow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #050002;
      overflow: hidden;
      cursor: none;
      display: flex;
      justify-content: center;
      align-items: center
    }

    canvas {
      display: block
    }

    ::-webkit-scrollbar {
      display: none
    }

    body {
      -ms-overflow-style: none;
      scrollbar-width: none
    }
  </style>
</head>

<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
  <script>
    const W = 1440, H = 1051;
    const cW = 800, cH = 584; // Virtual canvas size for scaling
    const BG = [5, 0, 2], RED = [190, 1, 41], RB = [255, 50, 90], CREAM = [254, 225, 191], MUTED = [138, 123, 120];
    const NL = { x: 140, y: cH / 2 }, NC = { x: cW / 2, y: cH / 2 }, NR = { x: 660, y: cH / 2 };
    let particles = [], pulsePhase = 0, mAngle = 0, termLines = [];

    // Exact silhouette from bobo.css clip-path (the SVG outline)
    const SILO = [
      [0, 1], [.89, 1], [.86, .90], [.85, .83], [.83, .76], [.80, .72], [.75, .69], [.72, .68],
      [.73, .66], [.78, .65], [.82, .63], [.85, .59], [.89, .54], [.90, .49], [.94, .44], [.95, .42],
      [.98, .39], [1, .29], [.97, .24], [.92, .19], [.86, .14], [.83, .12], [.88, .09], [.87, .04],
      [.83, 0], [.78, 0], [.73, .02], [.70, .05], [.64, .06], [.58, .08], [.54, .11], [.45, .07],
      [.37, .07], [.32, .08], [.30, .03], [.23, 0], [.17, .02], [.15, .07], [.17, .11], [.19, .14],
      [.19, .20], [.18, .25], [.12, .28], [.09, .36], [.07, .45], [.05, .52], [.05, .61], [.08, .66],
      [.09, .68], [.05, .72], [.03, .79], [.02, .85], [0, .92]
    ];

    const FEEDS = [
      "> SCAN 0x4f2a..9c31", "> ROAST CONF: 97.3%", "> MOOD: BEARISH",
      "> WHALE: 2.4M $BOBO", "> MEME: CRITICAL", "> bobOS AGENT: ONLINE",
      "> HELIUS: CONNECTED", "> SOL MAINNET: SYNC", "> PERSUADE: RANK 3",
      "> BRIBE TX: OK \u2713", "> TWEET: ARMED", "> BAL: 420.69",
      "> P1: VERIFIED", "> P2: BRIBED", "> ROAST: DEPLOYING",
      "> bobOS CORE: v6.9", "> CT: COPE DETECTED", "> DEGEN: ACTIVE",
      "> PAPER HANDS: 87%", "> SENTIMENT: FUD",
    ];

    class Particle {
      constructor(s) { this.s = s; this.t = 0; this.spd = random(.004, .009); this.sz = random(2.5, 4.5); this.br = random(180, 255); this.trail = []; }
      update() {
        this.t += this.spd;
        if (this.t >= 1) {
          if (this.s === 0) { pulsePhase = 1; this.s = 1; }
          else if (this.s === 1) { addFeed(); this.s = 2; }
          else if (this.s === 2) { pulsePhase = 1; this.s = 3; }
          else { this.s = 0; }
          this.t = 0; this.trail = [];
        }
        let p = this.pos(); this.trail.push({ x: p.x, y: p.y }); if (this.trail.length > 12) this.trail.shift();
      }
      pos() {
        if (this.s === 0) return bz(NL.x, NL.y, NL.x + 80, NL.y - 70, NC.x - 80, NC.y - 70, NC.x, NC.y, this.t);
        if (this.s === 1) return bz(NC.x, NC.y, NC.x + 80, NC.y + 70, NR.x - 80, NR.y + 70, NR.x, NR.y, this.t);
        if (this.s === 2) return bz(NR.x, NR.y, NR.x - 80, NR.y - 70, NC.x + 80, NC.y - 70, NC.x, NC.y, this.t);
        return bz(NC.x, NC.y, NC.x - 80, NC.y + 70, NL.x + 80, NL.y + 70, NL.x, NL.y, this.t);
      }
      draw() {
        let p = this.pos();
        if (this.trail.length > 1) {
          noFill();
          for (let i = 0; i < this.trail.length - 1; i++) {
            let a = map(i, 0, this.trail.length - 1, 0, 180);
            let w = map(i, 0, this.trail.length - 1, .5, this.sz * 1.2);
            strokeWeight(w); stroke(RED[0], RED[1], RED[2], a);
            line(this.trail[i].x, this.trail[i].y, this.trail[i + 1].x, this.trail[i + 1].y);
          }
        }
        drawingContext.shadowBlur = 14; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.9)`;
        noStroke(); fill(RB[0], RB[1], RB[2], this.br); ellipse(p.x, p.y, this.sz); 
        fill(255, 255, 255, 200); ellipse(p.x, p.y, this.sz * 0.4); // Hot white core
        drawingContext.shadowBlur = 0;
      }
    }
    function bz(x1, y1, cx1, cy1, cx2, cy2, x2, y2, t) { return { x: bezierPoint(x1, cx1, cx2, x2, t), y: bezierPoint(y1, cy1, cy2, y2, t) }; }
    function addFeed() { termLines.unshift({ text: random(FEEDS), age: 0, chars: 0 }); if (termLines.length > 8) termLines.pop(); }

    function setup() {
      createCanvas(W, H); pixelDensity(2); noSmooth(); textFont('monospace'); noFill();
      for (let i = 0; i < 14; i++) { let p = new Particle(floor(random(4))); p.t = random(); particles.push(p); }
      for (let i = 0; i < 5; i++)addFeed();
    }

    function draw() {
      background(BG[0], BG[1], BG[2]);
      push();
      scale(W / cW);
      drawGrid(); drawConns(); drawWallet(); drawBobo(); drawTimeline();
      for (let p of particles) { p.update(); p.draw(); }
      pulsePhase *= .93; mAngle += .007;
      drawHUD(); drawScanlines();
      pop();
    }

    function drawGrid() {
      stroke(RED[0], RED[1], RED[2], 30); strokeWeight(1);
      let offY = (frameCount * .3) % 40;
      for (let x = 0; x < cW; x += 40) line(x, 0, x, cH);
      for (let y = -40; y < cH + 40; y += 40) line(0, y + offY, cW, y + offY);
      
      // Draw intersection dots to make the grid pop
      noStroke(); fill(RED[0], RED[1], RED[2], 80);
      for (let x = 0; x < cW; x += 40) {
        for (let y = -40; y < cH + 40; y += 40) {
          rect(x - 1, y + offY - 1, 2, 2);
        }
      }
    }

    function drawConns() {
      noFill(); drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.35)`;
      stroke(RED[0], RED[1], RED[2], 30); strokeWeight(1.5);
      bezier(NL.x, NL.y, NL.x + 80, NL.y - 70, NC.x - 80, NC.y - 70, NC.x, NC.y);
      bezier(NC.x, NC.y, NC.x + 80, NC.y + 70, NR.x - 80, NR.y + 70, NR.x, NR.y);
      bezier(NR.x, NR.y, NR.x - 80, NR.y - 70, NC.x + 80, NC.y - 70, NC.x, NC.y);
      bezier(NC.x, NC.y, NC.x - 80, NC.y + 70, NL.x + 80, NL.y + 70, NL.x, NL.y);
      
      stroke(255, 255, 255, 12); strokeWeight(0.4);
      bezier(NL.x, NL.y, NL.x + 80, NL.y - 70, NC.x - 80, NC.y - 70, NC.x, NC.y);
      bezier(NC.x, NC.y, NC.x + 80, NC.y + 70, NR.x - 80, NR.y + 70, NR.x, NR.y);
      bezier(NR.x, NR.y, NR.x - 80, NR.y - 70, NC.x + 80, NC.y - 70, NC.x, NC.y);
      bezier(NC.x, NC.y, NC.x - 80, NC.y + 70, NL.x + 80, NL.y + 70, NL.x, NL.y);
      drawingContext.shadowBlur = 0;
    }

    function drawWallet() {
      let cx = NL.x, cy = NL.y;
      push(); translate(cx, cy);
      drawingContext.shadowBlur = 12; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 80); strokeWeight(1); noFill();
      push(); rotate(frameCount * 0.015); dArc(0, 0, 85, 3); pop();
      push(); rotate(-frameCount * 0.01); dArc(0, 0, 105, 4); pop();

      let rW = 100, rH = 140, ox = -rW / 2, oy = -rH / 2;
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.4)`;
      stroke(RED[0], RED[1], RED[2], 200); strokeWeight(1.5); fill(BG[0], BG[1], BG[2], 200);
      rect(ox, oy, rW, rH, 4);
      for (let i = 0; i < 5; i++) {
        let bY = oy + 10 + i * 25;
        stroke(RED[0], RED[1], RED[2], 60); strokeWeight(1.5); noFill();
        rect(ox + 8, bY, rW - 16, 14, 2);
        noStroke();
        let blink = (frameCount % (20 + i * 7) < 10) ? 255 : 40;
        fill(RB[0], RB[1], RB[2], blink); ellipse(ox + rW - 16, bY + 7, 4, 4);
        let blink2 = (frameCount % (35 + i * 4) < 15) ? 200 : 30;
        fill(CREAM[0], CREAM[1], CREAM[2], blink2); ellipse(ox + rW - 26, bY + 7, 3, 3);
        stroke(RED[0], RED[1], RED[2], 40); strokeWeight(1); line(ox + 16, bY + 7, ox + rW - 40, bY + 7);
      }
      drawingContext.shadowBlur = 0;
      pop();
      noStroke();
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.4)`;
      fill(CREAM[0], CREAM[1], CREAM[2], 255); textSize(10); textAlign(CENTER, CENTER);
      text("WALLET DATA", cx, cy + 105);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 180); textSize(8); text("SOURCE NODE", cx, cy + 119);
    }

    function drawBobo() {
      let cx = NC.x, cy = NC.y;
      let bW = 130, bH = 145;
      let ox = cx - bW / 2, oy = cy - bH / 2 - 5;
      let pg = 12 + pulsePhase * 30, pa = 180 + pulsePhase * 75;

      push();

      // === BOBO SILHOUETTE OUTLINE ===
      drawingContext.shadowBlur = pg;
      drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.8)`;
      fill(BG[0], BG[1], BG[2], 255); // Mask lines passing behind
      stroke(RED[0], RED[1], RED[2], pa); strokeWeight(2);
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);

      // Second outline pass — slightly larger for outer glow bloom
      stroke(RED[0], RED[1], RED[2], pa * .2); strokeWeight(4); noFill();
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);

      // Hot white inner core for the silhouette
      drawingContext.shadowBlur = 0;
      stroke(255, 255, 255, pa * 0.4); strokeWeight(0.5); noFill();
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);

      // Inner scan line sweeping across the silhouette
      let scanX = ((frameCount * 1.5) % bW);
      stroke(RB[0], RB[1], RB[2], 30 + pulsePhase * 40); strokeWeight(.8);
      line(ox + scanX, oy, ox + scanX, oy + bH);

      // Crosshair at center of silhouette removed

      // Corner brackets around silhouette
      let margin = 8, bkL = 12;
      stroke(RED[0], RED[1], RED[2], 100); strokeWeight(1.2);
      // TL
      line(ox - margin, oy - margin, ox - margin + bkL, oy - margin); line(ox - margin, oy - margin, ox - margin, oy - margin + bkL);
      // TR
      line(ox + bW + margin, oy - margin, ox + bW + margin - bkL, oy - margin); line(ox + bW + margin, oy - margin, ox + bW + margin, oy - margin + bkL);
      // BL
      line(ox - margin, oy + bH + margin, ox - margin + bkL, oy + bH + margin); line(ox - margin, oy + bH + margin, ox - margin, oy + bH + margin - bkL);
      // BR
      line(ox + bW + margin, oy + bH + margin, ox + bW + margin - bkL, oy + bH + margin); line(ox + bW + margin, oy + bH + margin, ox + bW + margin, oy + bH + margin - bkL);

      drawingContext.shadowBlur = 0;

      // Data points flickering on the outline
      if (frameCount % 6 === 0) {
        for (let i = 0; i < 3; i++) {
          let idx = floor(random(SILO.length));
          let pt = SILO[idx];
          drawingContext.shadowBlur = 12; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.9)`;
          noStroke(); fill(RB[0], RB[1], RB[2], 255);
          ellipse(ox + pt[0] * bW, oy + pt[1] * bH, 3, 3);
          drawingContext.shadowBlur = 0;
        }
      }

      pop();
      noStroke();
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.4)`;
      fill(CREAM[0], CREAM[1], CREAM[2], 255); textSize(10); textAlign(CENTER, CENTER);
      text("NEURAL CORE", cx, cy + 105);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 180); textSize(8); text("BOBO NODE", cx, cy + 119);
    }
    function dArc(cx, cy, r, n) { let g = TWO_PI / n, l = g * .55; for (let i = 0; i < n; i++)arc(cx, cy, r * 2, r * 2, i * g, i * g + l); }

    function drawTimeline() {
      let cx = NR.x, cy = NR.y, bw = 128, bh = 160, left = cx - bw / 2, top = cy - bh / 2;
      push();
      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 150); strokeWeight(1.5); noFill();
      rect(left, top, bw, bh, 2); line(left, top + 16, left + bw, top + 16);
      drawingContext.shadowBlur = 0;
      noStroke(); fill(RB[0], RB[1], RB[2], 255); textSize(8.5); textAlign(LEFT, CENTER);
      text("\u25b8 LIVE FEED", left + 6, top + 8);
      if (frameCount % 40 < 20) { fill(RB[0], RB[1], RB[2], 255); ellipse(left + bw - 8, top + 8, 4, 4); }
      textSize(7); textAlign(LEFT, TOP);
      for (let i = 0; i < termLines.length && i < 8; i++) {
        let e = termLines[i]; e.age++; e.chars += 1.2;
        let alpha = map(i, 0, 7, 255, 80), glow = 0;
        if (i === 0 && e.age < 10) { alpha = 255; glow = 12; fill(CREAM[0], CREAM[1], CREAM[2], alpha); }
        else fill(RED[0], RED[1], RED[2], alpha);
        if (glow > 0) { drawingContext.shadowBlur = glow; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.8)`; }
        noStroke();
        let dispText = e.text.substring(0, floor(e.chars));
        text(dispText, left + 6, top + 22 + i * 16);
        if (i === 0 && floor(e.chars) < e.text.length) {
          rect(left + 6 + textWidth(dispText) + 2, top + 22 + i * 16 + 1, 4, 6);
        }
        drawingContext.shadowBlur = 0;
      }
      let sY = top + 16 + ((frameCount * .8) % (bh - 16));
      stroke(RED[0], RED[1], RED[2], 18); strokeWeight(.8); line(left + 2, sY, left + bw - 2, sY);
      pop();
      noStroke();
      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.6)`;
      fill(CREAM[0], CREAM[1], CREAM[2], 255); textSize(11.5); textAlign(CENTER, CENTER);
      text("TIMELINE OUTPUT", cx, cy + 105);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 255); textSize(9); text("SINK NODE", cx, cy + 119);
    }

    function drawHUD() {
      // Title
      drawingContext.shadowBlur = 6; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.6)`;
      noStroke(); fill(RED[0], RED[1], RED[2], 255); textSize(13); textAlign(LEFT, TOP);
      text("ON-CHAIN DATA FLOW", 24, 24);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 200); textSize(8.5);
      text("ARCHITECTURE v6.9  \u00b7  REAL-TIME PIPELINE", 24, 40);

      // bobo_OS label with terminal blink
      textSize(13); textAlign(RIGHT, TOP);
      let label = (frameCount % 60 < 30) ? "bobo_OS_" : "bobo_OS ";
      fill(RED[0], RED[1], RED[2], 255); text(label, cW - 23, 18);

      stroke(RED[0], RED[1], RED[2], 50); strokeWeight(.5); line(cW - 120, 36, cW - 8, 36);
      noStroke(); fill(RED[0], RED[1], RED[2], 160); textSize(8.5); textAlign(RIGHT, TOP);
      text("SYS " + nf(hour(), 2) + ":" + nf(minute(), 2) + ":" + nf(second(), 2), cW - 23, 42);
      fill(MUTED[0], MUTED[1], MUTED[2], 120); textSize(7.5); text("FRM " + nf(frameCount, 6), cW - 23, 54);

      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, BOTTOM);
      text("\u25c6 SYS_KERNEL: ONLINE  \u25c6 NEURAL_LINK: SECURE  \u25c6 LAT: " + nf(random(8, 24), 1, 1) + "ms  \u25c6 " + floor(random(2400, 6800)) + " TX/s", 24, cH - 14);

      drawingContext.shadowBlur = 4; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.4)`;
      stroke(RED[0], RED[1], RED[2], 60); strokeWeight(1); noFill();
      let m1x = (NL.x + NC.x) / 2, m1y = NL.y - 44; chev(m1x, m1y, 6);
      let m2x = (NC.x + NR.x) / 2, m2y = NC.y + 44; chev(m2x, m2y, 6);
      drawingContext.shadowBlur = 0;
    }
    function chev(x, y, s) { beginShape(); vertex(x - s, y - s / 2); vertex(x, y); vertex(x - s, y + s / 2); endShape(); beginShape(); vertex(x - s / 2, y - s / 2); vertex(x + s / 2, y); vertex(x - s / 2, y + s / 2); endShape(); }

    function drawScanlines() {
      noStroke(); for (let y = 0; y < cH; y += 3) { fill(0, 0, 0, 16); rect(0, y, cW, 1); }
      let sy = (frameCount * 3) % cH; fill(RED[0], RED[1], RED[2], 8); rect(0, sy, cW, 30);
      fill(RED[0], RED[1], RED[2], 15); rect(0, sy + 10, cW, 4);
    }
  </script>
</body>

</html>
