<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>bobo_OS — X Payload Delivery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #050002; overflow: hidden; cursor: none; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; }
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
  <script>
    const W = 1440, H = 1051;
    const cW = 800, cH = 584;
    const BG = [5, 0, 2], RED = [190, 1, 41], RB = [255, 50, 90], CREAM = [254, 225, 191], MUTED = [138, 123, 120];

    const SILO = [
      [0,1],[.89,1],[.86,.90],[.85,.83],[.83,.76],[.80,.72],[.75,.69],[.72,.68],
      [.73,.66],[.78,.65],[.82,.63],[.85,.59],[.89,.54],[.90,.49],[.94,.44],[.95,.42],
      [.98,.39],[1,.29],[.97,.24],[.92,.19],[.86,.14],[.83,.12],[.88,.09],[.87,.04],
      [.83,0],[.78,0],[.73,.02],[.70,.05],[.64,.06],[.58,.08],[.54,.11],[.45,.07],
      [.37,.07],[.32,.08],[.30,.03],[.23,0],[.17,.02],[.15,.07],[.17,.11],[.19,.14],
      [.19,.20],[.18,.25],[.12,.28],[.09,.36],[.07,.45],[.05,.52],[.05,.61],[.08,.66],
      [.09,.68],[.05,.72],[.03,.79],[.02,.85],[0,.92]
    ];

    let memeImg, pulsePhase = 0, termLines = [];
    const FEEDS = [
      "> COMPILING TWEET...", "> SARCASM LEVEL: MAX", "> INSERTING MEME PAYLOAD",
      "> TARGET: @PAPER_HANDS_ANON", "> CHECKING RUG REFERENCES", "> FORMATTING COPE ANALYSIS",
      "> APPENDING PRICE MOCKERY", "> TWEET CHARACTER COUNT: 278",
    ];

    function preload() { memeImg = loadImage('assets/memes/bobo_thinks_2.png'); }
    function dArc(cx, cy, r, n) { let g = TWO_PI / n, l = g * .55; for (let i = 0; i < n; i++) arc(cx, cy, r * 2, r * 2, i * g, i * g + l); }
    function brackets(ox, oy, w, h, margin, bkL) {
      stroke(RED[0], RED[1], RED[2], 100); strokeWeight(1.2);
      line(ox-margin,oy-margin,ox-margin+bkL,oy-margin); line(ox-margin,oy-margin,ox-margin,oy-margin+bkL);
      line(ox+w+margin,oy-margin,ox+w+margin-bkL,oy-margin); line(ox+w+margin,oy-margin,ox+w+margin,oy-margin+bkL);
      line(ox-margin,oy+h+margin,ox-margin+bkL,oy+h+margin); line(ox-margin,oy+h+margin,ox-margin,oy+h+margin-bkL);
      line(ox+w+margin,oy+h+margin,ox+w+margin-bkL,oy+h+margin); line(ox+w+margin,oy+h+margin,ox+w+margin,oy+h+margin-bkL);
    }
    function bz(x1, y1, cx1, cy1, cx2, cy2, x2, y2, t) { return { x: bezierPoint(x1, cx1, cx2, x2, t), y: bezierPoint(y1, cy1, cy2, y2, t) }; }
    function addFeed() { termLines.unshift({ text: random(FEEDS), age: 0, chars: 0 }); if (termLines.length > 7) termLines.pop(); }
    function chev(x, y, s) { beginShape(); vertex(x-s,y-s/2); vertex(x,y); vertex(x-s,y+s/2); endShape(); beginShape(); vertex(x-s/2,y-s/2); vertex(x+s/2,y); vertex(x-s/2,y+s/2); endShape(); }

    // Payload particles
    class Particle {
      constructor() { this.t = random(); this.spd = random(.008, .018); this.sz = random(2, 4); this.trail = []; }
      update() {
        this.t += this.spd; if (this.t >= 1) { this.t = 0; this.trail = []; pulsePhase = 0.5; }
        let p = bz(150, cH / 2, 300, cH / 2 - 80, 500, cH / 2 + 80, 650, cH / 2, this.t);
        this.trail.push(p); if (this.trail.length > 10) this.trail.shift();
      }
      draw() {
        if (this.trail.length > 1) {
          noFill();
          for (let i = 0; i < this.trail.length - 1; i++) {
            let a = map(i, 0, this.trail.length - 1, 0, 180);
            strokeWeight(map(i, 0, this.trail.length - 1, .3, this.sz)); stroke(RED[0], RED[1], RED[2], a);
            line(this.trail[i].x, this.trail[i].y, this.trail[i + 1].x, this.trail[i + 1].y);
          }
        }
        let p = this.trail[this.trail.length - 1]; if (!p) return;
        drawingContext.shadowBlur = 14; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.9)`;
        noStroke(); fill(RB[0], RB[1], RB[2], 255); ellipse(p.x, p.y, this.sz);
        fill(255, 255, 255, 200); ellipse(p.x, p.y, this.sz * 0.4);
        drawingContext.shadowBlur = 0;
      }
    }

    let particles = [];

    function setup() {
      createCanvas(W, H); pixelDensity(2); noSmooth(); textFont('monospace'); imageMode(CENTER);
      for (let i = 0; i < 15; i++) particles.push(new Particle());
      for (let i = 0; i < 5; i++) addFeed();
    }

    function draw() {
      background(BG[0], BG[1], BG[2]);
      push(); scale(W / cW);
      drawGrid();

      // Connection curve
      noFill(); drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.35)`;
      stroke(RED[0], RED[1], RED[2], 30); strokeWeight(1.5);
      bezier(150, cH / 2, 300, cH / 2 - 80, 500, cH / 2 + 80, 650, cH / 2);
      stroke(255, 255, 255, 10); strokeWeight(0.4);
      bezier(150, cH / 2, 300, cH / 2 - 80, 500, cH / 2 + 80, 650, cH / 2);
      drawingContext.shadowBlur = 0;

      for (let p of particles) { p.update(); p.draw(); }

      drawBoboSilo();
      drawMemePayload();
      drawTargetNode();
      drawTerminal();

      // Chevrons along path
      drawingContext.shadowBlur = 4; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.4)`;
      stroke(RED[0], RED[1], RED[2], 60); strokeWeight(1); noFill();
      chev(cW / 2, cH / 2 - 20, 6);
      chev(cW / 2 + 40, cH / 2, 6);
      drawingContext.shadowBlur = 0;

      if (frameCount % 50 === 0) addFeed();
      pulsePhase *= .93;
      drawHUD();
      drawScanlines();
      pop();
    }

    function drawGrid() {
      stroke(RED[0], RED[1], RED[2], 30); strokeWeight(1);
      let offY = (frameCount * .3) % 40;
      for (let x = 0; x < cW; x += 40) line(x, 0, x, cH);
      for (let y = -40; y < cH + 40; y += 40) line(0, y + offY, cW, y + offY);
      noStroke(); fill(RED[0], RED[1], RED[2], 80);
      for (let x = 0; x < cW; x += 40) for (let y = -40; y < cH + 40; y += 40) rect(x - 1, y + offY - 1, 2, 2);
    }

    function drawBoboSilo() {
      let cx = 150, cy = cH / 2;
      let bW = 70, bH = 78;
      let ox = cx - bW / 2, oy = cy - bH / 2;

      push(); translate(cx, cy);
      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 60); strokeWeight(1); noFill();
      push(); rotate(frameCount * 0.015); dArc(0, 0, 55, 3); pop();
      push(); rotate(-frameCount * 0.01); dArc(0, 0, 68, 4); pop();
      drawingContext.shadowBlur = 0;
      pop();

      drawingContext.shadowBlur = 12; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.8)`;
      fill(BG[0], BG[1], BG[2], 255); stroke(RED[0], RED[1], RED[2], 160); strokeWeight(2);
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);
      drawingContext.shadowBlur = 0;
      stroke(255, 255, 255, 60); strokeWeight(0.5); noFill();
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);

      brackets(ox, oy, bW, bH, 8, 12);

      noStroke();
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.4)`;
      fill(CREAM[0], CREAM[1], CREAM[2], 255); textSize(10); textAlign(CENTER, CENTER);
      text("TWEET ENGINE", cx, cy + 60);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 180); textSize(8); text("SOURCE", cx, cy + 74);
    }

    function drawMemePayload() {
      if (!memeImg) return;
      let cx = cW / 2, cy = cH / 2;
      let pulse = map(sin(frameCount * 0.08), -1, 1, 0.92, 1.08);

      drawingContext.shadowBlur = 20; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},1)`;
      tint(255, 50, 90, 220);
      image(memeImg, cx, cy, 100 * pulse, 100 * pulse);
      noTint();
      drawingContext.shadowBlur = 0;

      // Expanding tunnel rings
      noFill();
      for (let i = 0; i < 4; i++) {
        let s = (frameCount * 1.5 + i * 30) % 120;
        let alpha = map(s, 0, 120, 200, 0);
        stroke(RED[0], RED[1], RED[2], alpha); strokeWeight(1.5);
        rectMode(CENTER); rect(cx, cy, 100 + s, 100 + s); rectMode(CORNER);
      }
    }

    function drawTargetNode() {
      let cx = 650, cy = cH / 2;
      let tw = 120, th = 140, left = cx - tw / 2, top = cy - th / 2;

      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 150); strokeWeight(1.5); noFill();
      rect(left, top, tw, th, 2); line(left, top + 16, left + tw, top + 16);
      drawingContext.shadowBlur = 0;

      noStroke(); fill(RB[0], RB[1], RB[2], 255); textSize(8.5); textAlign(LEFT, CENTER);
      text("\u25b8 X/TWITTER", left + 6, top + 8);
      if (frameCount % 40 < 20) { fill(RB[0], RB[1], RB[2]); ellipse(left + tw - 8, top + 8, 4, 4); }

      // Fake tweet preview
      textSize(6.5); textAlign(LEFT, TOP); fill(RED[0], RED[1], RED[2], 200);
      text("@bobo_bear", left + 6, top + 24);
      fill(RED[0], RED[1], RED[2], 140);
      text("yo @paper_hands_anon", left + 6, top + 38);
      text("i see 3 rug pulls,", left + 6, top + 50);
      text("0 $BOBO, and a", left + 6, top + 62);
      text("wallet full of cope.", left + 6, top + 74);
      text("ngmi. [IMG ATTACHED]", left + 6, top + 86);

      // Post status
      let cycle = frameCount % 300;
      fill(cycle > 200 ? color(255, 255, 255) : color(RED[0], RED[1], RED[2], 150));
      textSize(7.5);
      text(cycle > 200 ? "> POSTED \u2713" : "> PENDING...", left + 6, top + 110);

      brackets(left, top, tw, th, 8, 12);

      noStroke();
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.4)`;
      fill(CREAM[0], CREAM[1], CREAM[2], 255); textSize(10); textAlign(CENTER, CENTER);
      text("TIMELINE", cx, cy + th / 2 + 18);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 180); textSize(8); text("SINK NODE", cx, cy + th / 2 + 32);
    }

    function drawTerminal() {
      let tx = 30, ty = 70, tw = 180, th = 150;
      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 120); strokeWeight(1.5); noFill();
      rect(tx, ty, tw, th, 2); line(tx, ty + 16, tx + tw, ty + 16);
      drawingContext.shadowBlur = 0;

      noStroke(); fill(RB[0], RB[1], RB[2], 255); textSize(8.5); textAlign(LEFT, CENTER);
      text("\u25b8 COMPILE LOG", tx + 6, ty + 8);

      textSize(7); textAlign(LEFT, TOP);
      for (let i = 0; i < termLines.length && i < 6; i++) {
        let e = termLines[i]; e.age++; e.chars += 1.2;
        let alpha = map(i, 0, 5, 255, 80);
        if (i === 0 && e.age < 10) { fill(CREAM[0], CREAM[1], CREAM[2], 255); drawingContext.shadowBlur = 12; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.8)`; }
        else fill(RED[0], RED[1], RED[2], alpha);
        let dt = e.text.substring(0, floor(e.chars));
        text(dt, tx + 6, ty + 22 + i * 18);
        if (i === 0 && floor(e.chars) < e.text.length) rect(tx + 6 + textWidth(dt) + 2, ty + 22 + i * 18 + 1, 4, 6);
        drawingContext.shadowBlur = 0;
      }
    }

    function drawHUD() {
      drawingContext.shadowBlur = 6; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.6)`;
      noStroke(); fill(RED[0], RED[1], RED[2], 255); textSize(13); textAlign(LEFT, TOP);
      text("X PAYLOAD DELIVERY", 24, 24);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 200); textSize(8.5);
      text("bobo_OS v6.9  \u00b7  MEME WARFARE DIVISION", 24, 40);

      textSize(13); textAlign(RIGHT, TOP);
      let label = (frameCount % 60 < 30) ? "bobo_OS_" : "bobo_OS ";
      fill(RED[0], RED[1], RED[2], 255); text(label, cW - 23, 18);
      stroke(RED[0], RED[1], RED[2], 50); strokeWeight(.5); line(cW - 120, 36, cW - 8, 36);
      noStroke(); fill(RED[0], RED[1], RED[2], 160); textSize(8.5); textAlign(RIGHT, TOP);
      text("SYS " + nf(hour(), 2) + ":" + nf(minute(), 2) + ":" + nf(second(), 2), cW - 23, 42);
      fill(MUTED[0], MUTED[1], MUTED[2], 120); textSize(7.5); text("FRM " + nf(frameCount, 6), cW - 23, 54);

      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, BOTTOM);
      text("\u25c6 TWEET_QUEUE: " + floor(random(3, 12)) + "  \u25c6 MEMES_LOADED: 420  \u25c6 API_RATE: OK  \u25c6 " + floor(random(2400, 6800)) + " TX/s", 24, cH - 14);
    }

    function drawScanlines() {
      noStroke(); for (let y = 0; y < cH; y += 3) { fill(0, 0, 0, 16); rect(0, y, cW, 1); }
      let sy = (frameCount * 3) % cH; fill(RED[0], RED[1], RED[2], 8); rect(0, sy, cW, 30);
      fill(RED[0], RED[1], RED[2], 15); rect(0, sy + 10, cW, 4);
    }
  </script>
</body>
</html>
