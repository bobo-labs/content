<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>bobo_OS — Bribe Processor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #050002; overflow: hidden; cursor: none; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; }
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
  <script>
    const W = 1440, H = 1051;
    const cW = 800, cH = 584;
    const BG = [5, 0, 2], RED = [190, 1, 41], RB = [255, 50, 90], CREAM = [254, 225, 191], MUTED = [138, 123, 120];

    const SILO = [
      [0,1],[.89,1],[.86,.90],[.85,.83],[.83,.76],[.80,.72],[.75,.69],[.72,.68],
      [.73,.66],[.78,.65],[.82,.63],[.85,.59],[.89,.54],[.90,.49],[.94,.44],[.95,.42],
      [.98,.39],[1,.29],[.97,.24],[.92,.19],[.86,.14],[.83,.12],[.88,.09],[.87,.04],
      [.83,0],[.78,0],[.73,.02],[.70,.05],[.64,.06],[.58,.08],[.54,.11],[.45,.07],
      [.37,.07],[.32,.08],[.30,.03],[.23,0],[.17,.02],[.15,.07],[.17,.11],[.19,.14],
      [.19,.20],[.18,.25],[.12,.28],[.09,.36],[.07,.45],[.05,.52],[.05,.61],[.08,.66],
      [.09,.68],[.05,.72],[.03,.79],[.02,.85],[0,.92]
    ];

    let pulsePhase = 0, termLines = [];
    const FEEDS_ROAST = [
      "> SCANNING BAGS...", "> DUST WALLET CONFIRMED", "> 3 RUG PULLS DETECTED",
      "> PANIC SELLS: HIGH", "> $BOBO: 0 (NGMI)", "> MOCKERY QUEUED",
    ];
    const FEEDS_WHALE = [
      "> WAIT. SPL DEPOSIT DETECTED", "> INCOMING TX: +5,000,000 $BOBO",
      "> RANK UPGRADED: WHALE", "> ABORTING ROAST PROTOCOL", "> INITIATING PRAISE TWEET",
    ];

    function dArc(cx, cy, r, n) { let g = TWO_PI / n, l = g * .55; for (let i = 0; i < n; i++) arc(cx, cy, r * 2, r * 2, i * g, i * g + l); }
    function brackets(ox, oy, w, h, margin, bkL) {
      stroke(RED[0], RED[1], RED[2], 100); strokeWeight(1.2);
      line(ox-margin,oy-margin,ox-margin+bkL,oy-margin); line(ox-margin,oy-margin,ox-margin,oy-margin+bkL);
      line(ox+w+margin,oy-margin,ox+w+margin-bkL,oy-margin); line(ox+w+margin,oy-margin,ox+w+margin,oy-margin+bkL);
      line(ox-margin,oy+h+margin,ox-margin+bkL,oy+h+margin); line(ox-margin,oy+h+margin,ox-margin,oy+h+margin-bkL);
      line(ox+w+margin,oy+h+margin,ox+w+margin-bkL,oy+h+margin); line(ox+w+margin,oy+h+margin,ox+w+margin,oy+h+margin-bkL);
    }

    function setup() {
      createCanvas(W, H); pixelDensity(2); noSmooth(); textFont('monospace');
    }

    function draw() {
      background(BG[0], BG[1], BG[2]);
      push(); scale(W / cW);
      drawGrid();

      let cx = cW / 2, cy = cH / 2;
      let cycle = frameCount % 600;
      let state = cycle < 200 ? 0 : cycle < 400 ? 1 : 2; // 0=scanning, 1=bribe, 2=override

      drawVerificationRings(cx, cy, state);
      drawBoboSilo(cx, cy - 10, state);
      drawTerminalFeed(cx, cy, cycle, state);
      drawStatusLabel(cx, cy, state);

      if (state === 1 && cycle > 250) pulsePhase = 1;
      pulsePhase *= .93;
      drawHUD();
      drawScanlines();
      pop();
    }

    function drawGrid() {
      stroke(RED[0], RED[1], RED[2], 30); strokeWeight(1);
      let offY = (frameCount * .3) % 40;
      for (let x = 0; x < cW; x += 40) line(x, 0, x, cH);
      for (let y = -40; y < cH + 40; y += 40) line(0, y + offY, cW, y + offY);
      noStroke(); fill(RED[0], RED[1], RED[2], 80);
      for (let x = 0; x < cW; x += 40) for (let y = -40; y < cH + 40; y += 40) rect(x - 1, y + offY - 1, 2, 2);
    }

    function drawVerificationRings(cx, cy, state) {
      push(); translate(cx, cy);
      drawingContext.shadowBlur = 12; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 80); strokeWeight(1); noFill();
      push(); rotate(frameCount * 0.015); dArc(0, 0, 95, 3); pop();
      push(); rotate(-frameCount * 0.01); dArc(0, 0, 115, 4); pop();
      push(); rotate(frameCount * 0.008); dArc(0, 0, 135, 5); pop();
      drawingContext.shadowBlur = 0;
      pop();

      noFill(); stroke(RED[0], RED[1], RED[2], 50); strokeWeight(1);
      circle(cx, cy, 180);
      circle(cx, cy, 240);

      // Override flash
      if (state === 2) {
        drawingContext.shadowBlur = 30; drawingContext.shadowColor = `rgba(255,255,255,.3)`;
        stroke(255, 255, 255, 30 + sin(frameCount * 0.2) * 20); strokeWeight(2);
        circle(cx, cy, 200);
        drawingContext.shadowBlur = 0;
      }

      brackets(cx - 130, cy - 130, 260, 260, 8, 14);
    }

    function drawBoboSilo(cx, cy, state) {
      let bW = 90, bH = 100;
      let ox = cx - bW / 2, oy = cy - bH / 2;
      let pg = 12 + pulsePhase * 35, pa = 140 + pulsePhase * 80;

      drawingContext.shadowBlur = pg; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.8)`;
      fill(BG[0], BG[1], BG[2], 255); stroke(RED[0], RED[1], RED[2], pa); strokeWeight(2);
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);
      stroke(RED[0], RED[1], RED[2], pa * .2); strokeWeight(4); noFill();
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);
      drawingContext.shadowBlur = 0;
      stroke(255, 255, 255, pa * 0.35); strokeWeight(0.5); noFill();
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);

      let scanX = ((frameCount * 1.5) % bW);
      stroke(RB[0], RB[1], RB[2], 25 + pulsePhase * 40); strokeWeight(.8);
      line(ox + scanX, oy, ox + scanX, oy + bH);

      if (frameCount % 6 === 0) {
        for (let i = 0; i < 2; i++) {
          let idx = floor(random(SILO.length)), pt = SILO[idx];
          drawingContext.shadowBlur = 12; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.9)`;
          noStroke(); fill(RB[0], RB[1], RB[2], 255);
          ellipse(ox + pt[0] * bW, oy + pt[1] * bH, 3, 3);
          drawingContext.shadowBlur = 0;
        }
      }
    }

    function drawTerminalFeed(cx, cy, cycle, state) {
      let tx = 30, ty = cy - 100, tw = 200, th = 200;
      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 150); strokeWeight(1.5); noFill();
      rect(tx, ty, tw, th, 2); line(tx, ty + 16, tx + tw, ty + 16);
      drawingContext.shadowBlur = 0;

      noStroke(); fill(RB[0], RB[1], RB[2], 255); textSize(8.5); textAlign(LEFT, CENTER);
      text("\u25b8 TX MONITOR", tx + 6, ty + 8);
      if (frameCount % 40 < 20) { fill(RB[0], RB[1], RB[2]); ellipse(tx + tw - 8, ty + 8, 4, 4); }

      textSize(7.5); textAlign(LEFT, TOP);
      let feeds = state === 0 ? FEEDS_ROAST : FEEDS_WHALE;
      let baseDelay = state === 0 ? 0 : 200;
      for (let i = 0; i < feeds.length; i++) {
        let showAt = baseDelay + i * 30;
        if (cycle < showAt) break;
        let age = cycle - showAt;
        if (age < 12) { fill(CREAM[0], CREAM[1], CREAM[2], 255); drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.8)`; }
        else fill(RED[0], RED[1], RED[2], map(i, 0, feeds.length - 1, 255, 120));
        let chars = min(floor(age * 1.5), feeds[i].length);
        text(feeds[i].substring(0, chars), tx + 6, ty + 22 + i * 18);
        if (chars < feeds[i].length) rect(tx + 6 + textWidth(feeds[i].substring(0, chars)) + 2, ty + 22 + i * 18 + 1, 4, 6);
        drawingContext.shadowBlur = 0;
      }

      // Right panel
      let rx = cW - 230, ry = cy - 100, rw = 200, rh = 200;
      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 150); strokeWeight(1.5); noFill();
      rect(rx, ry, rw, rh, 2); line(rx, ry + 16, rx + rw, ry + 16);
      drawingContext.shadowBlur = 0;

      noStroke(); fill(RB[0], RB[1], RB[2], 255); textSize(8.5); textAlign(LEFT, CENTER);
      text("\u25b8 WALLET ANALYSIS", rx + 6, ry + 8);

      textSize(7.5); textAlign(LEFT, TOP);
      let walletData = [
        "ADDR: 0x8a9F...3b2C", "RANK: " + (state < 2 ? "PEASANT" : "WHALE"),
        "$BOBO: " + (state < 1 ? "0" : "5,000,000"), "RUGS: 3",
        "PANIC SELLS: 2", "FAILED MINTS: 7",
        "STATUS: " + (state < 2 ? "DUST" : "ROYALTY"),
      ];
      for (let i = 0; i < walletData.length; i++) {
        fill(RED[0], RED[1], RED[2], map(i, 0, walletData.length - 1, 255, 120));
        text("> " + walletData[i], rx + 6, ry + 22 + i * 18);
      }

      // Labels
      noStroke();
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.4)`;
      fill(CREAM[0], CREAM[1], CREAM[2], 255); textSize(9); textAlign(CENTER, CENTER);
      text("TX MONITOR", tx + tw / 2, ty + th + 16);
      text("WALLET DATA", rx + rw / 2, ry + rh + 16);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 180); textSize(7.5);
      text("SOURCE", tx + tw / 2, ty + th + 28);
      text("TARGET", rx + rw / 2, ry + rh + 28);
    }

    function drawStatusLabel(cx, cy, state) {
      let labels = ["ROAST PREPARED. AWAITING BRIBE...", "INCOMING TX DETECTED: +5M $BOBO", ">> OVERRIDE: WHALE DETECTED. PRAISE MODE <<"];
      let bx = cx - 200, by = cy + 170, bw = 400, bh = 28;

      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 120); strokeWeight(1); fill(BG[0], BG[1], BG[2], 220);
      rect(bx, by, bw, bh, 2);
      drawingContext.shadowBlur = 0;

      noStroke(); textAlign(CENTER, CENTER); textSize(11);
      if (state === 2) {
        fill(255, 255, 255);
        drawingContext.shadowBlur = 14; drawingContext.shadowColor = `rgba(255,255,255,1)`;
        if (frameCount % 16 < 8) text(labels[state], cx, by + bh / 2);
      } else if (state === 1) {
        fill(CREAM[0], CREAM[1], CREAM[2]);
        drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.6)`;
        text(labels[state], cx, by + bh / 2);
      } else {
        fill(RED[0], RED[1], RED[2], 200);
        text(labels[state], cx, by + bh / 2);
      }
      drawingContext.shadowBlur = 0;
    }

    function drawHUD() {
      drawingContext.shadowBlur = 6; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.6)`;
      noStroke(); fill(RED[0], RED[1], RED[2], 255); textSize(13); textAlign(LEFT, TOP);
      text("SOL BRIBE PROCESSOR", 24, 24);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 200); textSize(8.5);
      text("bobo_OS v6.9  \u00b7  RANK OVERRIDE ENGINE", 24, 40);

      textSize(13); textAlign(RIGHT, TOP);
      let label = (frameCount % 60 < 30) ? "bobo_OS_" : "bobo_OS ";
      fill(RED[0], RED[1], RED[2], 255); text(label, cW - 23, 18);
      stroke(RED[0], RED[1], RED[2], 50); strokeWeight(.5); line(cW - 120, 36, cW - 8, 36);
      noStroke(); fill(RED[0], RED[1], RED[2], 160); textSize(8.5); textAlign(RIGHT, TOP);
      text("SYS " + nf(hour(), 2) + ":" + nf(minute(), 2) + ":" + nf(second(), 2), cW - 23, 42);
      fill(MUTED[0], MUTED[1], MUTED[2], 120); textSize(7.5); text("FRM " + nf(frameCount, 6), cW - 23, 54);

      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, BOTTOM);
      text("\u25c6 BRIBE_ENGINE: READY  \u25c6 TREASURY: ACTIVE  \u25c6 LAT: " + nf(random(8, 24), 1, 1) + "ms  \u25c6 " + floor(random(2400, 6800)) + " TX/s", 24, cH - 14);
    }

    function drawScanlines() {
      noStroke(); for (let y = 0; y < cH; y += 3) { fill(0, 0, 0, 16); rect(0, y, cW, 1); }
      let sy = (frameCount * 3) % cH; fill(RED[0], RED[1], RED[2], 8); rect(0, sy, cW, 30);
      fill(RED[0], RED[1], RED[2], 15); rect(0, sy + 10, cW, 4);
    }
  </script>
</body>
</html>
