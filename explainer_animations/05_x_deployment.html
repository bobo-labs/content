<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>bobo_OS — Cross-Platform Neural Execution</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #050002; overflow: hidden; cursor: none; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; }
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
  <script>
    const W = 1440, H = 1051;
    const cW = 800, cH = 584;
    const BG = [5, 0, 2], RED = [190, 1, 41], RB = [255, 50, 90], CREAM = [254, 225, 191], MUTED = [138, 123, 120];

    const SILO = [
      [0,1],[.89,1],[.86,.90],[.85,.83],[.83,.76],[.80,.72],[.75,.69],[.72,.68],
      [.73,.66],[.78,.65],[.82,.63],[.85,.59],[.89,.54],[.90,.49],[.94,.44],[.95,.42],
      [.98,.39],[1,.29],[.97,.24],[.92,.19],[.86,.14],[.83,.12],[.88,.09],[.87,.04],
      [.83,0],[.78,0],[.73,.02],[.70,.05],[.64,.06],[.58,.08],[.54,.11],[.45,.07],
      [.37,.07],[.32,.08],[.30,.03],[.23,0],[.17,.02],[.15,.07],[.17,.11],[.19,.14],
      [.19,.20],[.18,.25],[.12,.28],[.09,.36],[.07,.45],[.05,.52],[.05,.61],[.08,.66],
      [.09,.68],[.05,.72],[.03,.79],[.02,.85],[0,.92]
    ];

    let memes = [];
    let currentMemeIndex = 0;
    let pulsePhase = 0;
    let logoImg;
    
    let targetNames = [
      "@PAPER_HANDS_ANON", "@REKT_GUY_99", "@SHITCOIN_MAXI", "@BUY_HIGH_SELL_LOW",
      "@NPC_TRADER", "@WEN_MOON_69", "@LIQUIDATED_AGAIN", "@RUG_PULLED_DEV"
    ];
    let currentTargetName = "@PAPER_HANDS_ANON";
    let currentRugs = 3;
    let barTargets = [1, 1, 1];

    function preload() { 
      logoImg = loadImage('assets/logo-p-500.png');
      memes.push({ img: loadImage('assets/memes/bobo_thinks.webp'), name: 'BOBO_THINKS' });
      memes.push({ img: loadImage('assets/memes/bobo_thinks_2.png'), name: 'BOBO_THINKS_2' });
      memes.push({ img: loadImage('assets/memes/bobo_thinks_3.png'), name: 'BOBO_THINKS_3' });
    }
    function dArc(cx, cy, r, n) { let g = TWO_PI / n, l = g * .55; for (let i = 0; i < n; i++) arc(cx, cy, r * 2, r * 2, i * g, i * g + l); }
    function brackets(ox, oy, w, h, margin, bkL) {
      stroke(RED[0], RED[1], RED[2], 100); strokeWeight(1.2);
      line(ox-margin,oy-margin,ox-margin+bkL,oy-margin); line(ox-margin,oy-margin,ox-margin,oy-margin+bkL);
      line(ox+w+margin,oy-margin,ox+w+margin-bkL,oy-margin); line(ox+w+margin,oy-margin,ox+w+margin,oy-margin+bkL);
      line(ox-margin,oy+h+margin,ox-margin+bkL,oy+h+margin); line(ox-margin,oy+h+margin,ox-margin,oy+h+margin-bkL);
      line(ox+w+margin,oy+h+margin,ox+w+margin-bkL,oy+h+margin); line(ox+w+margin,oy+h+margin,ox+w+margin,oy+h+margin-bkL);
    }
    function chev(x, y, s) { beginShape(); vertex(x-s,y-s/2); vertex(x,y); vertex(x-s,y+s/2); endShape(); beginShape(); vertex(x-s/2,y-s/2); vertex(x+s/2,y); vertex(x-s/2,y+s/2); endShape(); }

    function setup() {
      createCanvas(W, H); pixelDensity(2); noSmooth(); textFont('monospace');
    }

    function draw() {
      background(BG[0], BG[1], BG[2]);
      push(); scale(W / cW);
      drawGrid();

      let cx = cW / 2 - 80, cy = cH / 2 - 20;
      let SCAN_TIME = 200;
      let START_DELAY = 60;
      let cycle = frameCount % (350 + START_DELAY);
      let animCycle = cycle - START_DELAY;

      if (cycle === 0) {
        let nxt;
        do { nxt = floor(random(memes.length)); } while (nxt === currentMemeIndex && memes.length > 1);
        currentMemeIndex = nxt;
        
        currentTargetName = random(targetNames);
        currentRugs = floor(random(1, 12));
        barTargets = [random(0.7, 1), random(0.7, 1), random(0.7, 1)];
      }

      let leftX = cW / 2 - 160, leftY = cH / 2 - 30;
      let rightX = cW / 2 + 40, rightY = cH / 2 - 140;

      drawDataConduit(leftX, leftY, rightX, rightY, animCycle, SCAN_TIME);
      drawTargetRadar(leftX, leftY, animCycle);
      drawPayloadPanel(rightX, rightY, animCycle);
      drawMemoryFeed(animCycle);
      drawDeploymentStatus(animCycle, SCAN_TIME);

      pulsePhase *= .93;
      drawHUD();
      drawScanlines();
      pop();
    }

    function drawGrid() {
      stroke(RED[0], RED[1], RED[2], 30); strokeWeight(1);
      let offY = (frameCount * .3) % 40;
      for (let x = 0; x < cW; x += 40) line(x, 0, x, cH);
      for (let y = -40; y < cH + 40; y += 40) line(0, y + offY, cW, y + offY);
      noStroke(); fill(RED[0], RED[1], RED[2], 80);
      for (let x = 0; x < cW; x += 40) for (let y = -40; y < cH + 40; y += 40) rect(x - 1, y + offY - 1, 2, 2);
    }

    function drawDataConduit(lx, ly, rx, ry, cycle, SCAN_TIME) {
      let startX = lx + 140; 
      let startY = ly;
      let endX = rx - 5; 
      let endY = ry + 130; 
      
      let midX = (startX + endX) / 2;
      
      stroke(RED[0], RED[1], RED[2], 60); strokeWeight(1); noFill();
      beginShape();
      vertex(startX, startY);
      vertex(midX - 10, startY);
      vertex(midX + 10, endY);
      vertex(endX, endY);
      endShape();
      
      if (cycle >= 0 && cycle < SCAN_TIME) {
        let numPackets = 4;
        for(let i=0; i<numPackets; i++) {
          let cycleTime = cycle * 0.02 - (i/numPackets);
          if (cycleTime >= 0) {
              let t = cycleTime % 1;
              let px, py;
              if (t < 0.4) {
                px = map(t, 0, 0.4, startX, midX - 10);
                py = startY;
              } else if (t < 0.6) {
                px = map(t, 0.4, 0.6, midX - 10, midX + 10);
                py = map(t, 0.4, 0.6, startY, endY);
              } else {
                px = map(t, 0.6, 1, midX + 10, endX);
                py = endY;
              }
              
              drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(255,255,255,1)`;
              fill(255, 255, 255, 200); noStroke();
              rect(px - 2, py - 1, 4, 2);
              drawingContext.shadowBlur = 0;
          }
        }
      }
    }

    function drawMemoryFeed(cycle) {
      let feedX = cW - 80;
      let feedY = 60;
      let rows = Math.floor((cH - 120) / 10);
      
      textAlign(LEFT, TOP); textSize(6.5); noStroke();
      
      let speed = cycle < 280 ? 1 : 0.2;
      let tOffset = frameCount * speed;
      
      for(let i=0; i<rows; i++) {
        let yPos = feedY + i * 10;
        
        const b58Chars = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
        
        let seed1 = Math.abs((i * 12345 + floor(tOffset) * 6789));
        let b1 = "";
        for(let c=0; c<6; c++) b1 += b58Chars[(seed1 + c*13) % 58];
        
        let seed2 = Math.abs((i * 54321 + floor(tOffset) * 9876));
        let b2 = "";
        for(let c=0; c<4; c++) b2 += b58Chars[(seed2 + c*17) % 58];
        
        let intensity = noise(i * 0.1, tOffset * 0.05);
        
        if (intensity > 0.7) {
           fill(CREAM[0], CREAM[1], CREAM[2], 255);
           drawingContext.shadowBlur = 5; drawingContext.shadowColor = `rgba(255,255,255,0.8)`;
        } else {
           fill(RED[0], RED[1], RED[2], 60 + intensity * 60);
           drawingContext.shadowBlur = 0;
        }
        
        text(b1 + "  " + b2, feedX, yPos);
      }
      drawingContext.shadowBlur = 0;
    }

    function drawTargetRadar(cx, cy, cycle) {
      if (cycle < 0) {
         drawBoboSilo(cx, cy);
         let a = 150 + sin(frameCount * 0.1) * 100;
         fill(RED[0], RED[1], RED[2], a); noStroke(); textSize(8); textAlign(CENTER, CENTER);
         text(">> AWAITING TARGET <<", cx, cy);
         return;
      }
      
      drawBoboSilo(cx, cy);

      push(); translate(cx, cy);
      drawingContext.shadowBlur = 12; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.5)`;
      stroke(RED[0], RED[1], RED[2], 80); strokeWeight(1); noFill();
      push(); rotate(frameCount * 0.02); dArc(0, 0, 80, 3); pop();
      push(); rotate(-frameCount * 0.015); dArc(0, 0, 100, 4); pop();
      drawingContext.shadowBlur = 0;
      
      // Azimuth Ring
      push(); rotate(frameCount * 0.005);
      stroke(RED[0], RED[1], RED[2], 50); strokeWeight(1);
      for(let i=0; i<36; i++) {
         let ang = i * TWO_PI / 36;
         let r1 = 125, r2 = i % 3 === 0 ? 135 : 130;
         line(cos(ang)*r1, sin(ang)*r1, cos(ang)*r2, sin(ang)*r2);
      }
      pop();
      pop();

      let chSize = 110 + sin(frameCount * 0.04) * 8;
      stroke(RED[0], RED[1], RED[2], 80); strokeWeight(1);
      line(cx - chSize, cy, cx - 25, cy); line(cx + 25, cy, cx + chSize, cy);
      line(cx, cy - chSize, cx, cy - 25); line(cx, cy + 25, cx, cy + chSize);

      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},1)`;
      stroke(RB[0], RB[1], RB[2], 200); strokeWeight(2);
      arc(cx, cy, chSize * 1.4, chSize * 1.4, frameCount * 0.04, frameCount * 0.04 + PI / 3);
      arc(cx, cy, chSize * 1.4, chSize * 1.4, frameCount * 0.04 + PI, frameCount * 0.04 + PI + PI / 3);
      stroke(255, 255, 255, 100); strokeWeight(0.5);
      arc(cx, cy, chSize * 1.4, chSize * 1.4, frameCount * 0.04, frameCount * 0.04 + PI / 3);
      drawingContext.shadowBlur = 0;

      brackets(cx - chSize - 10, cy - chSize - 10, (chSize + 10) * 2, (chSize + 10) * 2, 8, 14);

      textAlign(CENTER, CENTER); noStroke();
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(255,255,255,.6)`;
      
      let fullText = "TARGET: " + currentTargetName;
      let tw = textWidth(fullText);
      let currX = cx - tw / 2;
      textSize(12);
      
      for (let i = 0; i < fullText.length; i++) {
        let charAge = cycle - i * 1.5;
        if (charAge < 0) continue; 
        
        let c = fullText[i];
        let xOff = 0, yOff = 0;
        
        if (charAge < 30) {
          let intensity = (30 - charAge) / 30; 
          xOff = random(-15, 15) * intensity;
          yOff = random(-15, 15) * intensity;
          
          if (random() < intensity && c !== ' ') {
             let randSet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*<>";
             c = randSet[floor(random(randSet.length))];
          }
          
          if (random() < 0.3 * intensity) fill(RB[0], RB[1], RB[2]);
          else fill(255, 255, 255);
        } else {
          fill(255, 255, 255);
        }
        
        let cW = textWidth(fullText[i]);
        text(c, currX + cW/2 + xOff, cy + chSize + 30 + yOff);
        currX += cW;
      }
      drawingContext.shadowBlur = 0;
      
      if (cycle > 40) {
        let subAlpha = map(cycle, 40, 70, 0, 180, true);
        fill(RED[0], RED[1], RED[2], subAlpha); textSize(8);
        text("TARGET LOCKED  \u00b7  INITIATING OBFUSCATION SEQUENCE", cx, cy + chSize + 44);
      }
    }

    function drawBoboSilo(cx, cy) {
      let bW = 50, bH = 56;
      let ox = cx - bW / 2, oy = cy - bH / 2;
      let pg = 8 + pulsePhase * 20, pa = 120 + pulsePhase * 50;

      drawingContext.shadowBlur = pg; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.6)`;
      stroke(RED[0], RED[1], RED[2], pa); strokeWeight(1.5); fill(BG[0], BG[1], BG[2], 180);
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);
      drawingContext.shadowBlur = 0;
      stroke(255, 255, 255, pa * 0.3); strokeWeight(0.4); noFill();
      beginShape(); for (let p of SILO) vertex(ox + p[0] * bW, oy + p[1] * bH); endShape(CLOSE);
      
      // Biometric Laser Scan
      let scanY = oy + (frameCount % bH);
      stroke(255, 255, 255, pa); strokeWeight(1);
      drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(255,255,255,0.8)`;
      line(ox - 5, scanY, ox + bW + 5, scanY);
      drawingContext.shadowBlur = 0;
    }

    function drawPayloadPanel(px, py, cycle) {
      let panelW = 265, panelH = 280;
      fill(BG[0], BG[1], BG[2], 200); stroke(RED[0], RED[1], RED[2], 50); strokeWeight(1);
      rect(px, py, panelW, panelH);
      brackets(px, py, panelW, panelH, 6, 12);

      // Phase switch at cycle 130
      let phase2 = cycle >= 130;

      // --- HEADER ---
      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, TOP);
      text(phase2 ? "X DEPLOYMENT MODULE" : "LLM PAYLOAD GENERATOR", px + 10, py + 10);
      let stateLabel = cycle < 0 ? "IDLE" : phase2 ? (cycle >= 200 ? "POSTED" : "DEPLOYING") : "GENERATING...";
      let stateCol = cycle >= 200 ? [80,255,120] : phase2 ? RB : MUTED;
      fill(stateCol[0],stateCol[1],stateCol[2],200); textAlign(RIGHT,TOP); textSize(8);
      text("["+stateLabel+"]", px+panelW-10, py+10);
      stroke(RED[0], RED[1], RED[2], 50); line(px+10, py+22, px+panelW-10, py+22);

      if (!phase2) {
        // === PHASE 1: LLM GENERATION ===
        noStroke(); fill(MUTED[0],MUTED[1],MUTED[2],160); textSize(7); textAlign(LEFT,TOP);
        text("MODEL: gemini-flash-3", px+12, py+30);
        text("TARGET: "+currentTargetName, px+12, py+40);
        text("SENTIMENT: HOSTILE", px+12, py+50);
        stroke(RED[0],RED[1],RED[2],30); line(px+10, py+62, px+panelW-10, py+62);

        noStroke(); fill(RED[0],RED[1],RED[2],160); textSize(7.5); textAlign(LEFT,TOP);
        text("> OUTPUT:", px+12, py+68);

        // Redacted roast lines — types out char by char
        let redactLines = [
          "\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2588\u2588.",
          "\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588, anon.",
          "\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588."
        ];
        for (let li = 0; li < redactLines.length; li++) {
          let lineStart = 20 + li * 35;
          if (cycle < lineStart) break;
          let chars = min(redactLines[li].length, floor((cycle - lineStart) * 1.8));
          let disp = redactLines[li].substring(0, chars) + (chars < redactLines[li].length ? "_" : "");
          fill(CREAM[0],CREAM[1],CREAM[2],200); textSize(8.5);
          text(disp, px+20, py+80+li*20);
        }

        // Generation bars
        let barLabels = ["TONE CALIBRATION", "ROAST SYNTHESIS", "FILTER BYPASS"];
        let barStarts = [0, 40, 80];
        let barDur = 45;
        let bW = panelW - 40, bH = 3;
        let bSX = px+20, bSY = py+160;
        noStroke(); textSize(7); textAlign(LEFT,TOP);
        for (let i=0; i<3; i++) {
          let p = constrain((cycle - barStarts[i]) / barDur, 0, 1);
          let by = bSY + i*28;
          fill(RED[0],RED[1],RED[2],160); text(barLabels[i], bSX, by-7);
          fill(MUTED[0],MUTED[1],MUTED[2],100); textAlign(RIGHT,TOP);
          text(floor(p*100)+"%", bSX+bW, by-7); textAlign(LEFT,TOP);
          stroke(RED[0],RED[1],RED[2],30); noFill();
          rect(bSX, by, bW, bH);
          let segs=50, sW=bW/segs, active=floor(p*segs);
          noStroke();
          for(let s=0;s<active;s++){
            fill(RB[0],RB[1],RB[2],map(s,0,segs,50,255));
            rect(bSX+s*sW, by, sW-1, bH);
          }
          if(p>0&&p<1){
            drawingContext.shadowBlur=6;drawingContext.shadowColor=`rgba(255,255,255,0.8)`;
            fill(CREAM[0],CREAM[1],CREAM[2],255);rect(bSX+active*sW-1,by-1,2,bH+2);
            drawingContext.shadowBlur=0;
          }
        }

      } else {
        // === PHASE 2: X POST CARD ===
        let cardX=px+10, cardY=py+28, cardW=panelW-20, cardH=150;
        fill(8,5,8,255); stroke(255,255,255,25); strokeWeight(1);
        rect(cardX, cardY, cardW, cardH, 5);

        // X logo (drawn as bold "X")
        drawingContext.shadowBlur=8; drawingContext.shadowColor=`rgba(255,255,255,0.9)`;
        fill(255,255,255,240); noStroke(); textSize(16); textAlign(LEFT,TOP);
        text("𝕏", cardX+10, cardY+10);
        drawingContext.shadowBlur=0;

        // Handle
        fill(CREAM[0],CREAM[1],CREAM[2],220); textSize(8.5); textAlign(LEFT,TOP);
        text("@bobo_os", cardX+32, cardY+14);
        fill(MUTED[0],MUTED[1],MUTED[2],160); textSize(7);
        text("Bobo Council  ·  now", cardX+32, cardY+24);

        stroke(255,255,255,15); line(cardX+10, cardY+38, cardX+cardW-10, cardY+38);

        // Redacted post body — typewriter from phase2 start
        let postLines = [
          "\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588.",
          currentTargetName+" \u2588\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2588.",
          "\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2588\u2588, anon."
        ];
        noStroke();
        for(let li=0;li<postLines.length;li++){
          let ls=130+li*18;
          if(cycle<ls)break;
          let chars=min(postLines[li].length,floor((cycle-ls)*2.2));
          let disp=postLines[li].substring(0,chars)+(chars<postLines[li].length?"_":"");
          fill(CREAM[0],CREAM[1],CREAM[2],210); textSize(8);
          text(disp, cardX+10, cardY+44+li*17);
        }

        // Footer
        fill(MUTED[0],MUTED[1],MUTED[2],140); textSize(7); textAlign(LEFT,BOTTOM);
        text("$BOBO  ·  pump.fun/bobo_os  ·  #RoastedOnChain", cardX+10, cardY+cardH-8);

        // Deploy progress bar
        let deployY = cardY+cardH+20;
        let deployProg = constrain(map(cycle, 130, 200, 0, 1), 0, 1);
        noStroke(); fill(RED[0],RED[1],RED[2],160); textSize(7.5); textAlign(LEFT,TOP);
        text("DEPLOYING TO X", px+12, deployY-10);
        fill(MUTED[0],MUTED[1],MUTED[2],100); textAlign(RIGHT,TOP);
        text(floor(deployProg*100)+"%", px+panelW-12, deployY-10);
        textAlign(LEFT,TOP);
        let dpW=panelW-24;
        stroke(RED[0],RED[1],RED[2],30); noFill(); rect(px+12, deployY, dpW, 4);
        let segs=60,sW=dpW/segs,active=floor(deployProg*segs);
        noStroke();
        for(let s=0;s<active;s++){
          fill(RB[0],RB[1],RB[2],map(s,0,segs,60,255));
          rect(px+12+s*sW, deployY, sW-1, 4);
        }
        if(deployProg>0&&deployProg<1){
          drawingContext.shadowBlur=6;drawingContext.shadowColor=`rgba(255,255,255,0.8)`;
          fill(CREAM[0],CREAM[1],CREAM[2],255);rect(px+12+active*sW-1,deployY-1,2,6);
          drawingContext.shadowBlur=0;
        }

        // Posted confirmation
        if(cycle>=205){
          let alpha=constrain(map(cycle,205,225,0,255),0,255);
          drawingContext.shadowBlur=10;drawingContext.shadowColor=`rgba(80,255,120,0.8)`;
          fill(80,255,120,alpha); textSize(9); textAlign(CENTER,TOP);
          text("✓  ROAST IS LIVE  ·  TARGET NOTIFIED", px+panelW/2, deployY+14);
          drawingContext.shadowBlur=0;
        }
      }
    }

    function drawDeploymentStatus(cycle, SCAN_TIME) {
      if (cycle < SCAN_TIME) return;
      let revealT = cycle - SCAN_TIME; 
      
      let px = cW/2;
      let py = cH - 100;
      let bw = 460; 
      let bh = 70;

      push();
      let alphaMult = 1;
      if (revealT > 120) {
          let outT = revealT - 120;
          alphaMult = constrain(map(outT, 0, 15, 1, 0), 0, 1);
      }
      
      translate(px, py);
      drawingContext.globalAlpha = alphaMult;

      let fillGrad = drawingContext.createLinearGradient(-bw/2, 0, bw/2, 0);
      fillGrad.addColorStop(0, `rgba(${BG[0]},${BG[1]},${BG[2]},0)`);
      fillGrad.addColorStop(0.1, `rgba(${BG[0]},${BG[1]},${BG[2]},1)`);
      fillGrad.addColorStop(0.9, `rgba(${BG[0]},${BG[1]},${BG[2]},1)`);
      fillGrad.addColorStop(1, `rgba(${BG[0]},${BG[1]},${BG[2]},0)`);
      
      drawingContext.fillStyle = fillGrad;
      stroke(RED[0], RED[1], RED[2], 255);
      strokeWeight(2);
      drawingContext.shadowBlur = 15;
      drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},1)`;
      
      rect(-bw/2, -bh/2, bw, bh, 8);
      drawingContext.shadowBlur = 0;

      noStroke();
      fill(CREAM[0], CREAM[1], CREAM[2], 255);
      textSize(11); textAlign(CENTER, CENTER);
      drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(255,255,255,0.8)`;
      text(">> ROAST DEPLOYED  ·  TARGET: " + currentTargetName + " <<", 0, -6);
      drawingContext.shadowBlur = 0;

      if (revealT > 30) {
         fill(RED[0], RED[1], RED[2], 220); textSize(9);
         text("LLM PAYLOAD LIVE ON X  ·  $BOBO FEES ROUTING ACTIVE", 0, 14);
      }
      drawingContext.globalAlpha = 1;
      
      if (revealT > 120) {
          let outT = revealT - 120;
          let gT = outT / 30;
          
          let chars = "01X_.:!/|\\";
          noStroke(); textSize(10); textAlign(CENTER, CENTER);
          for(let i=0; i<80; i++) {
              let gridX = floor(random(-bw/2, bw/2) / 10) * 10;
              let gridY = floor(random(-bh/2, bh/2) / 10) * 10;
              let scatterX = gridX + (random() > 0.5 ? 1 : -1) * outT * random(1, 8);
              let scatterY = gridY + (random() > 0.5 ? 1 : -1) * outT * random(0.5, 3);
              
              let alpha = map(gT, 0, 1, 255, 0);
              let c = random() > 0.4 ? RED : CREAM;
              fill(c[0], c[1], c[2], alpha);
              text(chars[floor(random(chars.length))], scatterX, scatterY);
          }
      }
      pop();
    }

    function drawHUD() {
      drawingContext.shadowBlur = 6; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.6)`;
      noStroke(); fill(RED[0], RED[1], RED[2], 255); textSize(13); textAlign(LEFT, TOP);
      text("ROAST ENGINE  //  X DEPLOYMENT", 24, 24);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 200); textSize(8.5);
      text("bobo_OS v6.9  \u00b7  LLM PAYLOAD SYNTHESIS & LIVE POSTING", 24, 40);

      textSize(13); textAlign(RIGHT, TOP);
      let label = (frameCount % 60 < 30) ? "bobo_OS_" : "bobo_OS ";
      fill(RED[0], RED[1], RED[2], 255); text(label, cW - 23, 18);
      stroke(RED[0], RED[1], RED[2], 50); strokeWeight(.5); line(cW - 120, 36, cW - 8, 36);
      noStroke(); fill(RED[0], RED[1], RED[2], 160); textSize(8.5); textAlign(RIGHT, TOP);
      text("SYS " + nf(hour(), 2) + ":" + nf(minute(), 2) + ":" + nf(second(), 2), cW - 23, 42);
      fill(MUTED[0], MUTED[1], MUTED[2], 120); textSize(7.5); text("FRM " + nf(frameCount, 6), cW - 23, 54);

      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, BOTTOM);
      text("\u25c6 X_NETWORK_API: CONNECTED  \u25c6 PAYLOAD_QUEUE: " + floor(random(3, 12)) + "  \u25c6 ENCRYPTION: ACTIVE  \u25c6 " + floor(random(2400, 6800)) + " TX/s", 24, cH - 14);

      if (logoImg) {
        drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
        tint(255, 50, 90, 200);
        imageMode(CENTER);
        image(logoImg, cW - 30, cH - 30, 40, 40);
        imageMode(CORNER);
        noTint();
        drawingContext.shadowBlur = 0;
      }
    }

    function drawScanlines() {
      noStroke(); for (let y = 0; y < cH; y += 3) { fill(0, 0, 0, 16); rect(0, y, cW, 1); }
      let sy = (frameCount * 3) % cH; fill(RED[0], RED[1], RED[2], 8); rect(0, sy, cW, 30);
      fill(RED[0], RED[1], RED[2], 15); rect(0, sy + 10, cW, 4);
    }
  </script>
