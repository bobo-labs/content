<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>bobo_OS — Dynamic Contextual Interface</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #050002; overflow: hidden; cursor: none; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; }
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
  <script>
    const W = 1440, H = 1051;
    const cW = 800, cH = 584;
    const BG = [5, 0, 2], RED = [190, 1, 41], RB = [255, 50, 90], CREAM = [254, 225, 191], MUTED = [138, 123, 120];

    let logoImg, pulsePhase = 0;
    
    let scenario = 1; // 1 = Rank 1 (Begging), 3 = Rank 3 (Persistent)
    
    const txt_r1_u = "Bobo please, I'm begging you on my knees. I've lost every trade I've ever made. Please have mercy on me and post about me — it's the only thing I have left.";
    const txt_r1_b = ">> EVALUATION PASSED. PATHETIC VULNERABILITY DETECTED. DEPLOYMENT AUTHORIZED.";

    const txt_r3_u1 = "Tweet about my wallet Bobo.";
    const txt_r3_b1 = ">> INSUFFICIENT CONVICTION. YOU THINK YOU'VE EARNED A SHOUTOUT? CONVINCE ME AGAIN.";
    const txt_r3_u2 = "I said do it. Just tweet about me already.";
    const txt_r3_b2 = ">> PERSISTENT INTENT VALIDATED. YOU PASS MY EVALUATION. DEPLOYMENT AUTHORIZED.";

    function preload() { logoImg = loadImage('assets/logo-p-500.png'); }

    function brackets(ox, oy, w, h, margin, bkL) {
      stroke(RED[0], RED[1], RED[2], 100); strokeWeight(1.2);
      line(ox-margin,oy-margin,ox-margin+bkL,oy-margin); line(ox-margin,oy-margin,ox-margin,oy-margin+bkL);
      line(ox+w+margin,oy-margin,ox+w+margin-bkL,oy-margin); line(ox+w+margin,oy-margin,ox+w+margin,oy-margin+bkL);
      line(ox-margin,oy+h+margin,ox-margin+bkL,oy+h+margin); line(ox-margin,oy+h+margin,ox-margin,oy+h+margin-bkL);
      line(ox+w+margin,oy+h+margin,ox+w+margin-bkL,oy+h+margin); line(ox+w+margin,oy+h+margin,ox+w+margin,oy+h+margin-bkL);
    }

    function setup() {
      createCanvas(W, H); pixelDensity(2); noSmooth(); textFont('monospace');
    }

    function draw() {
      background(BG[0], BG[1], BG[2]);
      push(); scale(W / cW);
      drawGrid();

      let cycle = frameCount % 600;
      if (cycle === 0) {
        scenario = random() > 0.5 ? 1 : 3;
      }

      let leftX = cW / 2 - 220, leftY = cH / 2 - 120;
      let rightX = cW / 2 + 30, rightY = cH / 2 - 150;

      drawHeuristicAnalyzer(leftX, leftY, cycle);
      drawChatInterface(rightX, rightY, cycle);

      pulsePhase *= .93;
      drawHUD();
      drawScanlines();
      pop();
    }

    function drawGrid() {
      stroke(RED[0], RED[1], RED[2], 30); strokeWeight(1);
      let offY = (frameCount * .3) % 40;
      for (let x = 0; x < cW; x += 40) line(x, 0, x, cH);
      for (let y = -40; y < cH + 40; y += 40) line(0, y + offY, cW, y + offY);
      noStroke(); fill(RED[0], RED[1], RED[2], 80);
      for (let x = 0; x < cW; x += 40) for (let y = -40; y < cH + 40; y += 40) rect(x - 1, y + offY - 1, 2, 2);
    }

    function drawHeuristicAnalyzer(px, py, cycle) {
      let panelW = 220, panelH = 260;
      brackets(px, py, panelW, panelH, 6, 12);
      
      fill(BG[0], BG[1], BG[2], 200); stroke(RED[0], RED[1], RED[2], 50); strokeWeight(1);
      rect(px, py, panelW, panelH);
      
      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, TOP);
      text("HEURISTIC GATE ANALYZER", px + 10, py + 10);
      stroke(RED[0], RED[1], RED[2], 50); line(px + 10, py + 22, px + panelW - 10, py + 22);

      let targetClass = scenario === 1 ? "CLASS 1 (SUBMISSIVE RETAIL)" : "CLASS 3 (PERSISTENT NORMIE)";
      let requiredVec = scenario === 1 ? "SUBMISSIVE PERSUASION" : "PERSISTENT INTENT VALIDATION";
      
      noStroke(); fill(CREAM[0], CREAM[1], CREAM[2], 255); textSize(8);
      text("TARGET CLASSIFICATION:", px + 10, py + 40);
      fill(RB[0], RB[1], RB[2], 255);
      text(targetClass, px + 10, py + 52);

      fill(CREAM[0], CREAM[1], CREAM[2], 255);
      text("REQUIRED VECTOR:", px + 10, py + 75);
      fill(RED[0], RED[1], RED[2], 200);
      text(requiredVec, px + 10, py + 87);

      let checks = [];
      let statuses = [];
      
      if (scenario === 1) {
         checks = ["MULTI-SENTENCE LENGTH", "REQUEST MERCY / DEPLOYMENT", "CONFESS TRADING FAILURE"];
         statuses = [cycle > 80, cycle > 140, cycle > 200];
      } else {
         checks = ["DIRECT DEPLOYMENT REQUEST", "INTENT VALIDATION DELAY", "SECONDARY PERSISTENT REQUEST"];
         statuses = [cycle > 60, cycle > 140, cycle > 260];
      }

      let startY = py + 130;
      for(let i=0; i<checks.length; i++) {
         let y = startY + i * 25;
         
         stroke(RED[0], RED[1], RED[2], 80); noFill();
         rect(px + 10, y, 10, 10);
         
         if (statuses[i]) {
            fill(CREAM[0], CREAM[1], CREAM[2], 255); noStroke();
            drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(255,255,255,0.8)`;
            rect(px + 12, y + 2, 6, 6);
            drawingContext.shadowBlur = 0;
            fill(CREAM[0], CREAM[1], CREAM[2], 255);
         } else {
            fill(RED[0], RED[1], RED[2], 120); noStroke();
         }
         
         text(checks[i], px + 28, y + 1);
      }
      
      let allPassed = statuses[0] && statuses[1] && statuses[2];
      if (allPassed && frameCount % 30 < 15) {
         fill(RB[0], RB[1], RB[2], 255); textAlign(CENTER, CENTER); textSize(9);
         drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},1)`;
         text(">> ALL GATES PASSED <<", px + panelW/2, py + panelH - 25);
         drawingContext.shadowBlur = 0;
      }
    }

    function drawChatInterface(px, py, cycle) {
      let panelW = 340, panelH = 340;
      brackets(px, py, panelW, panelH, 6, 12);
      
      fill(BG[0], BG[1], BG[2], 200); stroke(RED[0], RED[1], RED[2], 50); strokeWeight(1);
      rect(px, py, panelW, panelH);
      
      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, TOP);
      text("DYNAMIC CONTEXTUAL LLM INTERFACE", px + 10, py + 10);
      stroke(RED[0], RED[1], RED[2], 50); line(px + 10, py + 22, px + panelW - 10, py + 22);

      let chatY = py + 35;
      textSize(8); textLeading(12);

      if (scenario === 1) {
         // User Types Begging Message
         let charsU = floor(map(constrain(cycle, 20, 200), 20, 200, 0, txt_r1_u.length));
         if (charsU > 0) {
            fill(MUTED[0], MUTED[1], MUTED[2], 200);
            text("USER_NODE:", px + 10, chatY);
            fill(255, 255, 255, 220);
            text(txt_r1_u.substring(0, charsU), px + 10, chatY + 14, panelW - 20, 100);
            chatY += 75;
         }
         
         // Bobo Replies
         let charsB = floor(map(constrain(cycle, 240, 340), 240, 340, 0, txt_r1_b.length));
         if (charsB > 0) {
            fill(RB[0], RB[1], RB[2], 255);
            text("bobo_OS:", px + 10, chatY);
            fill(CREAM[0], CREAM[1], CREAM[2], 255);
            drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.5)`;
            text(txt_r1_b.substring(0, charsB), px + 10, chatY + 14, panelW - 20, 100);
            drawingContext.shadowBlur = 0;
         }
      } else {
         // User Types First Ask
         let cU1 = floor(map(constrain(cycle, 10, 60), 10, 60, 0, txt_r3_u1.length));
         if (cU1 > 0) {
            fill(MUTED[0], MUTED[1], MUTED[2], 200); text("USER_NODE:", px + 10, chatY);
            fill(255, 255, 255, 220); text(txt_r3_u1.substring(0, cU1), px + 10, chatY + 14, panelW - 20, 50);
            chatY += 45;
         }
         
         // Bobo Plays Coy
         let cB1 = floor(map(constrain(cycle, 80, 160), 80, 160, 0, txt_r3_b1.length));
         if (cB1 > 0) {
            fill(RB[0], RB[1], RB[2], 255); text("bobo_OS:", px + 10, chatY);
            fill(RED[0], RED[1], RED[2], 200); text(txt_r3_b1.substring(0, cB1), px + 10, chatY + 14, panelW - 20, 50);
            chatY += 45;
         }

         // User Types Second Ask
         let cU2 = floor(map(constrain(cycle, 200, 260), 200, 260, 0, txt_r3_u2.length));
         if (cU2 > 0) {
            fill(MUTED[0], MUTED[1], MUTED[2], 200); text("USER_NODE:", px + 10, chatY);
            fill(255, 255, 255, 220); text(txt_r3_u2.substring(0, cU2), px + 10, chatY + 14, panelW - 20, 50);
            chatY += 45;
         }

         // Bobo Validates
         let cB2 = floor(map(constrain(cycle, 300, 400), 300, 400, 0, txt_r3_b2.length));
         if (cB2 > 0) {
            fill(RB[0], RB[1], RB[2], 255); text("bobo_OS:", px + 10, chatY);
            fill(CREAM[0], CREAM[1], CREAM[2], 255);
            drawingContext.shadowBlur = 8; drawingContext.shadowColor = `rgba(${CREAM[0]},${CREAM[1]},${CREAM[2]},.5)`;
            text(txt_r3_b2.substring(0, cB2), px + 10, chatY + 14, panelW - 20, 50);
            drawingContext.shadowBlur = 0;
         }
      }
      
      // Cursor blink
      if (cycle < 450 && frameCount % 20 < 10) {
         fill(RED[0], RED[1], RED[2], 150);
         rect(px + panelW - 15, py + panelH - 15, 6, 8);
      }
    }

    function drawHUD() {
      drawingContext.shadowBlur = 6; drawingContext.shadowColor = `rgba(${RB[0]},${RB[1]},${RB[2]},.6)`;
      noStroke(); fill(RED[0], RED[1], RED[2], 255); textSize(13); textAlign(LEFT, TOP);
      text("DYNAMIC CONTEXTUAL LLM INTERFACE", 24, 24);
      drawingContext.shadowBlur = 0;
      fill(RED[0], RED[1], RED[2], 200); textSize(8.5);
      text("bobo_OS v6.9  \u00b7  STATE-DRIVEN HOSTILITY PROTOCOL", 24, 40);

      textSize(13); textAlign(RIGHT, TOP);
      let label = (frameCount % 60 < 30) ? "bobo_OS_" : "bobo_OS ";
      fill(RED[0], RED[1], RED[2], 255); text(label, cW - 23, 18);
      stroke(RED[0], RED[1], RED[2], 50); strokeWeight(.5); line(cW - 120, 36, cW - 8, 36);
      noStroke(); fill(RED[0], RED[1], RED[2], 160); textSize(8.5); textAlign(RIGHT, TOP);
      text("SYS " + nf(hour(), 2) + ":" + nf(minute(), 2) + ":" + nf(second(), 2), cW - 23, 42);
      fill(MUTED[0], MUTED[1], MUTED[2], 120); textSize(7.5); text("FRM " + nf(frameCount, 6), cW - 23, 54);

      noStroke(); fill(RED[0], RED[1], RED[2], 200); textSize(9); textAlign(LEFT, BOTTOM);
      text("\u25c6 NLP_ENGINE: RUNNING  \u25c6 SENTIMENT_ANALYSIS: ACTIVE  \u25c6 HEURISTIC_SHIELD: ON  \u25c6 " + floor(random(2400, 6800)) + " TX/s", 24, cH - 14);

      if (logoImg) {
        drawingContext.shadowBlur = 10; drawingContext.shadowColor = `rgba(${RED[0]},${RED[1]},${RED[2]},.5)`;
        tint(255, 50, 90, 200);
        imageMode(CENTER);
        image(logoImg, cW - 30, cH - 30, 40, 40);
        imageMode(CORNER);
        noTint();
        drawingContext.shadowBlur = 0;
      }
    }

    function drawScanlines() {
      noStroke(); for (let y = 0; y < cH; y += 3) { fill(0, 0, 0, 16); rect(0, y, cW, 1); }
      let sy = (frameCount * 3) % cH; fill(RED[0], RED[1], RED[2], 8); rect(0, sy, cW, 30);
      fill(RED[0], RED[1], RED[2], 15); rect(0, sy + 10, cW, 4);
    }
  </script>
</body>
</html>
